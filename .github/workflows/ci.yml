name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feature/final-delivery-ci-cd]

permissions:
  contents: read

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: Local_ci_StrongPassword123!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Local_ci_StrongPassword123!' -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    env:
      ConnectionStrings__EventosVivosDb: Server=localhost,1433;Database=EventosVivosTestDb;User Id=sa;Password=Local_ci_StrongPassword123!;TrustServerCertificate=True;Encrypt=False

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore backend
        run: dotnet restore tests/backend/EventosVivos.Tests/EventosVivos.Tests.csproj

      - name: Build backend
        run: dotnet build tests/backend/EventosVivos.Tests/EventosVivos.Tests.csproj --configuration Release --no-restore

      - name: Test backend
        run: dotnet test tests/backend/EventosVivos.Tests/EventosVivos.Tests.csproj --configuration Release --no-build --nologo

  frontend:
    name: Frontend build and tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend/eventos-vivos-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/frontend/eventos-vivos-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Test frontend
        run: npm test -- --watch=false

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/backend/Dockerfile -t eventosvivos-api:ci .

      - name: Build frontend image
        run: docker build -f docker/frontend/Dockerfile -t eventosvivos-frontend:ci .
