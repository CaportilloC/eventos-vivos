name: Deploy Azure

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push and deploy to Azure
    runs-on: ubuntu-latest

    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_NAME }}.azurecr.io
      API_IMAGE_NAME: eventosvivos-api
      FRONTEND_IMAGE_NAME: eventosvivos-frontend
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build and push backend image
        run: |
          docker build \
            -f docker/backend/Dockerfile \
            -t "$ACR_LOGIN_SERVER/$API_IMAGE_NAME:$IMAGE_TAG" \
            .
          docker push "$ACR_LOGIN_SERVER/$API_IMAGE_NAME:$IMAGE_TAG"

      - name: Build and push frontend image
        run: |
          docker build \
            -f docker/frontend/Dockerfile \
            -t "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:$IMAGE_TAG" \
            .
          docker push "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:$IMAGE_TAG"

      - name: Deploy backend Container App
        run: |
          az containerapp update \
            --name "${{ vars.API_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "$ACR_LOGIN_SERVER/$API_IMAGE_NAME:$IMAGE_TAG"

      - name: Wait for backend health
        run: |
          API_URL="https://$(az containerapp show \
            --name "${{ vars.API_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)"

          for attempt in $(seq 1 30); do
            status=$(curl -fsS -o /tmp/api-health.json -w "%{http_code}" "$API_URL/health/ready" || true)
            if [ "$status" = "200" ]; then
              cat /tmp/api-health.json
              exit 0
            fi
            sleep 10
          done

          cat /tmp/api-health.json 2>/dev/null || true
          exit 1

      - name: Deploy frontend Container App
        run: |
          az containerapp update \
            --name "${{ vars.FRONTEND_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:$IMAGE_TAG" \
            --set-env-vars API_PROXY_BASE_URL="${{ vars.API_PROXY_BASE_URL }}"

      - name: Smoke test deployed platform
        run: |
          API_URL="https://$(az containerapp show \
            --name "${{ vars.API_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)"
          FRONTEND_URL="https://$(az containerapp show \
            --name "${{ vars.FRONTEND_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)"

          echo "API_URL=$API_URL"
          echo "FRONTEND_URL=$FRONTEND_URL"

          curl -fsS "$API_URL/health/ready"
          curl -fsS "$API_URL/api/v1/reservations/available-events" > /tmp/available-events.json
          python -m json.tool /tmp/available-events.json > /dev/null
          curl -fsSI "$FRONTEND_URL" | sed -n '1,6p'
          curl -fsS "$FRONTEND_URL/api/v1/reservations/available-events" > /tmp/frontend-available-events.json
          python -m json.tool /tmp/frontend-available-events.json > /dev/null
          curl -fsSL "$FRONTEND_URL/swagger" | grep -qi "swagger"
