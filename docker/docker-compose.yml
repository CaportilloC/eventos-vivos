services:
  # ── SQL Server ─────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eventosvivos-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── ASP.NET Core API ───────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: eventosvivos-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__EventosVivosDb: "Server=sqlserver,1433;Database=EventosVivosDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      DemoData__SeedOnStartup: "true"
      DemoData__ResetBeforeSeed: "true"
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  # ── Angular Frontend (nginx) ───────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: eventosvivos-frontend
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlserver-data:
